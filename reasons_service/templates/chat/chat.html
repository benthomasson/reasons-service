{% extends "base.html" %}

{% block title %}Chat — {{ project.name }} — Reasons Service{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
}
const renderer = new marked.Renderer();
renderer.link = function({ href, title, text }) {
    // Only allow http(s) and relative URLs — block javascript: and data: protocols
    if (href && !/^https?:\/\//i.test(href) && !href.startsWith('/')) {
        return escapeHtml(text);
    }
    const safeHref = escapeHtml(href || '');
    const titleAttr = title ? ` title="${escapeHtml(title)}"` : '';
    return `<a href="${safeHref}"${titleAttr} target="_blank" rel="noopener">${escapeHtml(text)}</a>`;
};
marked.setOptions({ renderer });
</script>
<style>
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); }
    .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .chat-messages {
        flex: 1; overflow-y: auto; padding: 1rem;
        border: 1px solid var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);
        margin-bottom: 1rem;
    }
    .message { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 0.5rem; max-width: 85%; }
    .message.user { background: var(--pico-primary-background); margin-left: auto; color: #fff; }
    .message.assistant { background: var(--pico-card-background-color); margin-right: auto; }
    .message .role { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 0.25rem; color: var(--pico-muted-color); }
    .message .content { word-break: break-word; }
    .message .content h1, .message .content h2, .message .content h3 { margin: 0.5rem 0 0.25rem; font-size: 1.1rem; }
    .message .content h2 { font-size: 1rem; }
    .message .content h3 { font-size: 0.95rem; }
    .message .content p { margin: 0.25rem 0; }
    .message .content ul, .message .content ol { margin: 0.25rem 0; padding-left: 1.5rem; }
    .message .content code { font-size: 0.85em; padding: 0.1rem 0.3rem; background: var(--pico-muted-border-color); border-radius: 3px; }
    .message .content pre { margin: 0.5rem 0; padding: 0.5rem; background: var(--pico-muted-border-color); border-radius: 4px; overflow-x: auto; }
    .message .content pre code { padding: 0; background: none; }
    .tool-indicator { font-size: 0.8rem; color: var(--pico-muted-color); font-style: italic; padding: 0.25rem 1rem; margin-right: auto; max-width: 85%; }
    .chat-input { display: flex; gap: 0.5rem; }
    .chat-input input { flex: 1; margin-bottom: 0; }
    .chat-input button { margin-bottom: 0; white-space: nowrap; }
    #model-select { width: auto; margin-bottom: 0; padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    .verify-btn { font-size: 0.8rem !important; padding: 0.25rem 0.75rem !important; margin-top: 0.5rem; }
    .verify-panel { margin-top: 0.5rem; font-size: 0.85rem; }
    .verify-panel details { border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); padding: 0.5rem 0.75rem; }
    .verify-item { display: flex; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid var(--pico-muted-border-color); }
    .verify-item:last-child { border-bottom: none; }
    .verify-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.1rem; }
    .verify-in .verify-icon { color: #198754; }
    .verify-out .verify-icon { color: #ffc107; }
    .verify-error .verify-icon { color: #dc3545; }
    .verify-status { font-size: 0.75rem; font-family: monospace; }
    .verify-text { color: var(--pico-muted-color); margin: 0.25rem 0; }
    .verify-detail { font-size: 0.8rem; color: var(--pico-muted-color); font-style: italic; }
    .message-timing { font-size: 0.7rem; color: var(--pico-muted-color); margin-top: 0.5rem; font-style: italic; }
    .cite-link { text-decoration: none; font-weight: bold; cursor: pointer; }
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <div>
            <a href="/projects/{{ project.id }}">&larr; {{ project.name }}</a>
            <h3 style="margin:0.25rem 0 0 0">Chat with {{ project.domain }} Expert</h3>
        </div>
        <select id="model-select">
            <option value="claude-opus-4-6">Claude Opus 4.6</option>
            <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
            <option value="ollama:gemma3:27b">Gemma 3 27B</option>
        </select>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Ask about {{ project.domain }}..." autofocus>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const projectId = "{{ project.id }}";
const threadId = crypto.randomUUID();
let sending = false;
let messageCount = 0;

document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
}

function appendMessage(role, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="role">${role}</div><div class="content"></div>`;
    div.querySelector('.content').textContent = text;
    messages.appendChild(div);
    scrollToBottom();
    return div.querySelector('.content');
}

function appendToolIndicator(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'tool-indicator';
    div.textContent = text;
    messages.appendChild(div);
    scrollToBottom();
}

async function sendMessage() {
    if (sending) return;
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;

    sending = true;
    input.value = '';
    document.getElementById('send-btn').setAttribute('aria-busy', 'true');

    appendMessage('user', message);

    let contentEl = appendMessage('assistant', '');
    contentEl.textContent = 'Thinking...';
    const startTime = performance.now();

    try {
        const response = await fetch(`/api/projects/${projectId}/ask`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                question: message,
                model: document.getElementById('model-select').value,
            }),
        });

        const data = await response.json();
        const answer = data.answer || data.error || 'No answer returned.';

        messageCount++;
        contentEl.innerHTML = marked.parse(answer);
        linkCitations(contentEl, messageCount);
        addExplainButtons(contentEl);

        // Add verify button if citations found
        const citations = extractCitations(answer);
        if (citations.beliefs.length > 0 || citations.entries.length > 0 || citations.sources.length > 0) {
            const verifyBtn = document.createElement('button');
            verifyBtn.className = 'outline secondary verify-btn';
            verifyBtn.textContent = 'Verify Sources';
            verifyBtn.onclick = () => verifyCitations(verifyBtn, citations);
            contentEl.parentElement.appendChild(verifyBtn);
        }
    } catch (err) {
        contentEl.textContent = `Error: ${err.message}`;
    }

    // Show elapsed time
    const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
    const timingEl = document.createElement('div');
    timingEl.className = 'message-timing';
    timingEl.textContent = `${elapsed}s`;
    contentEl.parentElement.appendChild(timingEl);

    sending = false;
    document.getElementById('send-btn').removeAttribute('aria-busy');
    input.focus();
}

function extractCitations(text) {
    // Strip fenced code blocks and inline backticks to avoid false positives
    const cleaned = text.replace(/```[\s\S]*?```/g, '').replace(/`/g, '');
    const citations = { beliefs: [], entries: [], sources: [] };
    let match;

    // Extract belief IDs: inline [belief-id] refs and **[belief-id]** in Beliefs section
    // Belief IDs are lowercase with hyphens, dots, colons (e.g. operations:q2-validates-framework)
    const beliefSection = cleaned.match(/## Beliefs[\s\S]*/);
    if (beliefSection) {
        const beliefPattern = /\[([a-z0-9][a-z0-9._:-]*[a-z0-9])\]/gi;
        while ((match = beliefPattern.exec(beliefSection[0])) !== null) {
            const id = match[1].toLowerCase().replace(/[.,;:]+$/, '');
            if (id && !citations.beliefs.includes(id)) {
                citations.beliefs.push(id);
            }
        }
    }

    const entryPattern = /Entry\s+([a-f0-9]{6,})/gi;
    while ((match = entryPattern.exec(cleaned)) !== null) {
        const id = match[1];
        if (!citations.entries.includes(id)) {
            citations.entries.push(id);
        }
    }

    // Match source references: [Source: slug] (from the Sources section)
    const sourcePattern = /\[Source:\s+([a-z0-9][a-z0-9./_-]+)\]/gi;
    while ((match = sourcePattern.exec(cleaned)) !== null) {
        const slug = match[1].replace(/[.,;:)+]+$/, '');
        if (slug && !citations.sources.includes(slug)) {
            citations.sources.push(slug);
        }
    }

    return citations;
}

async function verifyCitations(button, citations) {
    button.setAttribute('aria-busy', 'true');
    button.disabled = true;

    const existingPanel = button.parentElement.querySelector('.verify-panel');
    if (existingPanel) existingPanel.remove();

    const beliefPromises = citations.beliefs.map(id =>
        fetch(`/api/projects/${projectId}/beliefs/${encodeURIComponent(id)}`)
            .then(r => r.json())
            .then(data => ({ type: 'belief', id, data, ok: !data.error && !data.detail }))
            .catch(() => ({ type: 'belief', id, data: null, ok: false }))
    );

    const entryPromises = citations.entries.map(id =>
        fetch(`/api/projects/${projectId}/entries/${id}`)
            .then(r => r.json())
            .then(data => ({ type: 'entry', id, data, ok: !data.error }))
            .catch(() => ({ type: 'entry', id, data: null, ok: false }))
    );

    const sourcePromises = citations.sources.map(slug =>
        fetch(`/api/projects/${projectId}/sources/${slug}`)
            .then(r => r.json())
            .then(data => ({ type: 'source', id: slug, data, ok: !data.error }))
            .catch(() => ({ type: 'source', id: slug, data: null, ok: false }))
    );

    const results = await Promise.all([...beliefPromises, ...entryPromises, ...sourcePromises]);

    const panel = document.createElement('div');
    panel.className = 'verify-panel';
    let html = '<details open><summary style="font-size:0.85rem; cursor:pointer;">Source Verification</summary>';

    for (const r of results) {
        if (r.type === 'belief') {
            html += renderBeliefVerification(r);
        } else if (r.type === 'entry') {
            html += renderEntryVerification(r);
        } else if (r.type === 'source') {
            html += renderSourceVerification(r);
        }
    }

    html += '</details>';
    panel.innerHTML = html;
    button.parentElement.appendChild(panel);
    button.removeAttribute('aria-busy');
    button.disabled = false;
}

function renderBeliefVerification(result) {
    if (!result.ok) {
        return `<div class="verify-item verify-error">
            <span class="verify-icon">&#10007;</span>
            <div><strong>${result.id}</strong> — not found</div>
        </div>`;
    }
    const d = result.data;
    const isIn = d.truth_value === 'IN';
    const cls = isIn ? 'verify-in' : 'verify-out';
    const icon = isIn ? '&#10003;' : '&#9888;';

    let details = '';
    if (d.source) {
        details += `<div class="verify-detail">Source: ${d.source}</div>`;
    }
    if (d.justifications && d.justifications.length > 0) {
        const j = d.justifications[0];
        if (j.antecedents && j.antecedents.length > 0) {
            details += `<div class="verify-detail">Depends on: ${j.antecedents.join(', ')}</div>`;
        }
        if (j.label) {
            details += `<div class="verify-detail">Justification: ${j.label}</div>`;
        }
    }
    if (d.dependents && d.dependents.length > 0) {
        details += `<div class="verify-detail">${d.dependents.length} dependent belief(s)</div>`;
    }

    return `<div class="verify-item ${cls}">
        <span class="verify-icon">${icon}</span>
        <div>
            <strong>${d.id}</strong> <span class="verify-status">[${d.truth_value}]</span>
            <div class="verify-text">${d.text}</div>
            ${details}
            <button class="outline verify-btn" onclick="explainBelief(this, '${d.id}')"
                style="font-size:0.75rem; padding:0.1rem 0.5rem; margin-top:0.25rem;">Why?</button>
        </div>
    </div>`;
}

function renderEntryVerification(result) {
    if (!result.ok) {
        return `<div class="verify-item verify-error">
            <span class="verify-icon">&#10007;</span>
            <div><strong>Entry ${result.id}</strong> — not found</div>
        </div>`;
    }
    const d = result.data;
    const snippet = d.content.length > 300 ? d.content.substring(0, 300) + '...' : d.content;
    let sourceDetails = '';
    if (d.sources && d.sources.length > 0) {
        const sourceLinks = d.sources.map(s =>
            s.url ? `<a href="${s.url}" target="_blank">${s.slug}</a>` : s.slug
        ).join(', ');
        sourceDetails = `<div class="verify-detail">Sources: ${sourceLinks}</div>`;
    }
    return `<div class="verify-item verify-in">
        <span class="verify-icon">&#10003;</span>
        <div>
            <strong>Entry ${d.id}</strong>${d.title ? ` — ${d.title}` : ''}
            <div class="verify-detail">Topic: ${d.topic}</div>
            ${sourceDetails}
            <div class="verify-text">${snippet}</div>
        </div>
    </div>`;
}

function renderSourceVerification(result) {
    if (!result.ok) {
        return `<div class="verify-item verify-error">
            <span class="verify-icon">&#10007;</span>
            <div><strong>Source ${result.id}</strong> — not found</div>
        </div>`;
    }
    const d = result.data;
    let details = '';
    if (d.url) {
        details += `<div class="verify-detail">URL: <a href="${d.url}" target="_blank">${d.url}</a></div>`;
    }
    if (d.word_count) {
        details += `<div class="verify-detail">${d.word_count.toLocaleString()} words</div>`;
    }
    return `<div class="verify-item verify-in">
        <span class="verify-icon">&#10003;</span>
        <div>
            <strong>Source</strong> ${d.slug}
            ${details}
        </div>
    </div>`;
}

function linkCitations(container, msgId) {
    const prefix = `ref-${msgId}-`;

    // Phase 1: Collect slug keys from the Sources/Beliefs footnotes
    // Rendered as <li><strong>[slug]</strong> ...</li>
    const slugSet = new Set();
    for (const el of container.querySelectorAll('li')) {
        const strong = el.querySelector('strong');
        if (!strong) continue;
        const match = strong.textContent.match(/^\[([^\]]+)\]$/);
        if (match) {
            const slug = match[1];
            slugSet.add(slug);
            // CSS-safe ID: replace non-alphanumeric with hyphens
            const safeId = `${prefix}${slug.replace(/[^a-z0-9]/gi, '-')}`;
            el.id = safeId;
        }
    }
    if (slugSet.size === 0) return;

    // Phase 2: Turn inline [slug] refs into scroll links
    // Build a regex that matches any known slug in brackets
    const escaped = [...slugSet].map(s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
    const pattern = new RegExp('\\[(' + escaped.join('|') + ')\\]', 'g');

    for (const el of container.querySelectorAll('p, li')) {
        if (el.id && el.id.startsWith(prefix)) continue;  // skip the targets themselves
        const html = el.innerHTML;
        const replaced = html.replace(pattern, (full, slug) => {
            const safeId = `${prefix}${slug.replace(/[^a-z0-9]/gi, '-')}`;
            const target = container.querySelector(`#${safeId}`);
            if (!target) return full;
            return `<a href="#${safeId}" class="cite-link" onclick="event.preventDefault(); document.getElementById('${safeId}').scrollIntoView({behavior:'smooth', block:'center'}); document.getElementById('${safeId}').style.background='var(--pico-primary-focus)'; setTimeout(()=>document.getElementById('${safeId}').style.background='', 1500);">[${slug}]</a>`;
        });
        if (replaced !== html) el.innerHTML = replaced;
    }
}

function addExplainButtons(container) {
    // Find "belief: some-belief-id" in rendered HTML and replace with explain buttons
    // After marked.parse(), these appear inside <p> tags as text
    const paragraphs = container.querySelectorAll('p');
    for (const p of paragraphs) {
        const html = p.innerHTML;
        const replaced = html.replace(
            /belief:\s*([a-z0-9][a-z0-9._:-]*)/g,
            (match, beliefId) => {
                return `<button class="outline verify-btn" onclick="explainBelief(this, '${beliefId}')" `
                    + `style="font-size:0.75rem; padding:0.1rem 0.5rem;">Why?</button>`;
            }
        );
        if (replaced !== html) {
            p.innerHTML = replaced;
        }
    }
}

function explainBelief(button, nodeId) {
    // Send "explain {belief-id}" as a chat message for full LLM-narrated explanation
    const input = document.getElementById('chat-input');
    input.value = `explain ${nodeId}`;
    sendMessage();
}
</script>
{% endblock %}
