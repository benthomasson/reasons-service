{% extends "base.html" %}

{% block title %}Meta-Expert — Reasons Service{% endblock %}

{% block extra_head %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    .chat-container { display: flex; flex-direction: column; height: calc(100vh - 200px); }
    .chat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .chat-messages {
        flex: 1; overflow-y: auto; padding: 1rem;
        border: 1px solid var(--pico-muted-border-color);
        border-radius: var(--pico-border-radius);
        margin-bottom: 1rem;
    }
    .message { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 0.5rem; max-width: 85%; }
    .message.user { background: var(--pico-primary-background); margin-left: auto; color: #fff; }
    .message.assistant { background: var(--pico-card-background-color); margin-right: auto; }
    .message .role { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 0.25rem; color: var(--pico-muted-color); }
    .message .content { word-break: break-word; }
    .message .content h1, .message .content h2, .message .content h3 { margin: 0.5rem 0 0.25rem; font-size: 1.1rem; }
    .message .content h2 { font-size: 1rem; }
    .message .content h3 { font-size: 0.95rem; }
    .message .content p { margin: 0.25rem 0; }
    .message .content ul, .message .content ol { margin: 0.25rem 0; padding-left: 1.5rem; }
    .message .content code { font-size: 0.85em; padding: 0.1rem 0.3rem; background: var(--pico-muted-border-color); border-radius: 3px; }
    .message .content pre { margin: 0.5rem 0; padding: 0.5rem; background: var(--pico-muted-border-color); border-radius: 4px; overflow-x: auto; }
    .message .content pre code { padding: 0; background: none; }
    .tool-indicator { font-size: 0.8rem; color: var(--pico-muted-color); font-style: italic; padding: 0.25rem 1rem; margin-right: auto; max-width: 85%; }
    .reflection-indicator { font-size: 0.7rem; color: var(--pico-muted-color); font-style: italic; padding: 0.15rem 1rem; margin-right: auto; max-width: 85%; opacity: 0.6; }
    .chat-input { display: flex; gap: 0.5rem; }
    .chat-input input { flex: 1; margin-bottom: 0; }
    .chat-input button { margin-bottom: 0; white-space: nowrap; }
    #model-select { width: auto; margin-bottom: 0; padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    .expert-chips { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .expert-chip { font-size: 0.75rem; padding: 0.2rem 0.6rem; background: var(--pico-muted-border-color); border-radius: 1rem; color: var(--pico-muted-color); }
    .verify-btn { font-size: 0.8rem !important; padding: 0.25rem 0.75rem !important; margin-top: 0.5rem; }
    .verify-panel { margin-top: 0.5rem; font-size: 0.85rem; }
    .verify-panel details { border: 1px solid var(--pico-muted-border-color); border-radius: var(--pico-border-radius); padding: 0.5rem 0.75rem; }
    .verify-item { display: flex; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid var(--pico-muted-border-color); }
    .verify-item:last-child { border-bottom: none; }
    .verify-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 0.1rem; }
    .verify-in .verify-icon { color: #198754; }
    .verify-out .verify-icon { color: #ffc107; }
    .verify-error .verify-icon { color: #dc3545; }
    .verify-status { font-size: 0.75rem; font-family: monospace; }
    .verify-text { color: var(--pico-muted-color); margin: 0.25rem 0; }
    .verify-detail { font-size: 0.8rem; color: var(--pico-muted-color); font-style: italic; }
    .message-timing { font-size: 0.7rem; color: var(--pico-muted-color); margin-top: 0.5rem; font-style: italic; }
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <div>
            <a href="/">&larr; Projects</a>
            <h3 style="margin:0.25rem 0 0 0">Meta-Expert</h3>
            <div class="expert-chips">
                {% for expert in experts %}
                <span class="expert-chip" title="{{ expert.domain }}">{{ expert.name }}</span>
                {% endfor %}
            </div>
        </div>
        <select id="model-select">
            <option value="claude-opus-4-6">Claude Opus 4.6</option>
            <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
            <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
        </select>
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="chat-input">
        <input type="text" id="chat-input" placeholder="Ask across all domain experts..." autofocus>
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const threadId = crypto.randomUUID();
const expertsMap = {
    {% for expert in experts %}
    "{{ expert.name }}": "{{ expert.id }}",
    {% endfor %}
};
let sending = false;

document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function scrollToBottom() {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
}

function appendMessage(role, text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `<div class="role">${role}</div><div class="content"></div>`;
    div.querySelector('.content').textContent = text;
    messages.appendChild(div);
    scrollToBottom();
    return div.querySelector('.content');
}

function appendToolIndicator(text) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'tool-indicator';
    div.textContent = text;
    messages.appendChild(div);
    scrollToBottom();
}

function appendReflectionIndicator(name, args) {
    const messages = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'reflection-indicator';
    if (name === 'rms_add' && args.node_id) {
        div.textContent = `Learning: ${args.node_id}`;
    } else if (name === 'rms_search') {
        div.textContent = `Checking existing knowledge...`;
    } else {
        div.textContent = `Reflecting: ${name}`;
    }
    messages.appendChild(div);
    scrollToBottom();
}

function formatToolCall(name, args) {
    if (name === 'ask_expert' && args.expert_name) {
        return `Consulting ${args.expert_name} expert...`;
    }
    if (name === 'list_experts') {
        return 'Checking available experts...';
    }
    if (name.startsWith('rms_')) {
        return `Using tool: ${name}...`;
    }
    return `Using tool: ${name}...`;
}

async function sendMessage() {
    if (sending) return;
    const input = document.getElementById('chat-input');
    const message = input.value.trim();
    if (!message) return;

    sending = true;
    input.value = '';
    document.getElementById('send-btn').setAttribute('aria-busy', 'true');

    appendMessage('user', message);

    let contentEl = null;
    let rawMarkdown = '';
    const startTime = performance.now();

    try {
        const response = await fetch('/api/meta/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                message: message,
                model: document.getElementById('model-select').value,
                thread_id: threadId,
            }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream: true});

            const lines = buffer.split('\n');
            buffer = lines.pop();

            let eventType = null;
            for (const line of lines) {
                if (line.startsWith('event: ')) {
                    eventType = line.slice(7).trim();
                } else if (line.startsWith('data: ')) {
                    try {
                        const data = JSON.parse(line.slice(6));
                        if (eventType === 'tool_call') {
                            appendToolIndicator(formatToolCall(data.name, data.args));
                        } else if (eventType === 'tool_result') {
                            // Tool result received
                        } else if (eventType === 'reflection') {
                            appendReflectionIndicator(data.name, data.args);
                        } else if (eventType === 'done') {
                            if (contentEl && rawMarkdown) {
                                contentEl.innerHTML = marked.parse(rawMarkdown);
                            }
                        } else if (data.type === 'token') {
                            if (!contentEl) {
                                contentEl = appendMessage('assistant', '');
                            }
                            rawMarkdown += data.content;
                            contentEl.textContent = rawMarkdown;
                            scrollToBottom();
                        }
                    } catch (e) {
                        // Skip malformed JSON
                    }
                    eventType = null;
                }
            }
        }
        if (contentEl && rawMarkdown) {
            contentEl.innerHTML = marked.parse(rawMarkdown);
        }
    } catch (err) {
        if (!contentEl) {
            contentEl = appendMessage('assistant', '');
        }
        contentEl.textContent = `Error: ${err.message}`;
    }

    // Show elapsed time
    if (contentEl) {
        const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
        const timingEl = document.createElement('div');
        timingEl.className = 'message-timing';
        timingEl.textContent = `${elapsed}s`;
        contentEl.parentElement.appendChild(timingEl);
    }

    // Add verify button if citations found
    if (contentEl && rawMarkdown) {
        const citations = extractCitations(rawMarkdown);
        if (citations.beliefs.length > 0 || citations.entries.length > 0 || citations.sources.length > 0) {
            const verifyBtn = document.createElement('button');
            verifyBtn.className = 'outline secondary verify-btn';
            verifyBtn.textContent = 'Verify Sources';
            verifyBtn.onclick = () => verifyCitations(verifyBtn, citations);
            contentEl.parentElement.appendChild(verifyBtn);
        }
    }

    sending = false;
    document.getElementById('send-btn').removeAttribute('aria-busy');
    input.focus();
}

function extractCitations(text) {
    const cleaned = text.replace(/```[\s\S]*?```/g, '').replace(/`/g, '');
    const citations = { beliefs: [], entries: [], sources: [] };

    // Match belief citations: belief: rhel9-foo, belief ID: rhel9-foo, belief ID rhel9-foo
    // Include colon for namespaced IDs like operations:q2-validates-framework
    const beliefPattern = /belief[:\s]+(?:ID[:\s]+)?([a-z0-9][a-z0-9._:-]*)/gi;
    let match;
    while ((match = beliefPattern.exec(cleaned)) !== null) {
        // Strip trailing punctuation (periods, commas at end of sentences)
        const id = match[1].toLowerCase().replace(/[.,;:]+$/, '');
        if (id && !citations.beliefs.includes(id)) {
            citations.beliefs.push(id);
        }
    }

    const entryPattern = /Entry\s+([a-f0-9]{6,})/gi;
    while ((match = entryPattern.exec(cleaned)) !== null) {
        const id = match[1];
        if (!citations.entries.includes(id)) {
            citations.entries.push(id);
        }
    }

    // Match source references: Source: <slug> or (Source: <slug>)
    // Require slug to contain a dot or hyphen to avoid matching bare agent names
    // like "operations" from belief source fields
    const sourcePattern = /Source[:\s]+([a-z0-9][a-z0-9._-]*[._-][a-z0-9._-]*)/gi;
    while ((match = sourcePattern.exec(cleaned)) !== null) {
        const slug = match[1].replace(/[.,;:)+]+$/, '');
        if (slug && !citations.sources.includes(slug)) {
            citations.sources.push(slug);
        }
    }

    return citations;
}

async function verifyCitations(button, citations) {
    button.setAttribute('aria-busy', 'true');
    button.disabled = true;

    const existingPanel = button.parentElement.querySelector('.verify-panel');
    if (existingPanel) existingPanel.remove();

    // For meta-expert, search across ALL experts for each citation
    const beliefPromises = citations.beliefs.map(async (id) => {
        // Try each expert's project to find the belief
        for (const [name, projectId] of Object.entries(expertsMap)) {
            try {
                const r = await fetch(`/api/projects/${projectId}/beliefs/${encodeURIComponent(id)}`);
                const data = await r.json();
                if (!data.error && !data.detail) {
                    return { type: 'belief', id, data, ok: true, expert: name };
                }
            } catch (e) { /* try next */ }
        }
        return { type: 'belief', id, data: null, ok: false, expert: null };
    });

    const entryPromises = citations.entries.map(async (id) => {
        for (const [name, projectId] of Object.entries(expertsMap)) {
            try {
                const r = await fetch(`/api/projects/${projectId}/entries/${id}`);
                const data = await r.json();
                if (!data.error) {
                    return { type: 'entry', id, data, ok: true, expert: name };
                }
            } catch (e) { /* try next */ }
        }
        return { type: 'entry', id, data: null, ok: false, expert: null };
    });

    const sourcePromises = citations.sources.map(async (slug) => {
        for (const [name, projectId] of Object.entries(expertsMap)) {
            try {
                const r = await fetch(`/api/projects/${projectId}/sources/${slug}`);
                const data = await r.json();
                if (!data.error) {
                    return { type: 'source', id: slug, data, ok: true, expert: name };
                }
            } catch (e) { /* try next */ }
        }
        return { type: 'source', id: slug, data: null, ok: false, expert: null };
    });

    const results = await Promise.all([...beliefPromises, ...entryPromises, ...sourcePromises]);

    const panel = document.createElement('div');
    panel.className = 'verify-panel';
    let html = '<details open><summary style="font-size:0.85rem; cursor:pointer;">Source Verification</summary>';

    for (const r of results) {
        if (r.type === 'belief') {
            html += renderBeliefVerification(r);
        } else if (r.type === 'entry') {
            html += renderEntryVerification(r);
        } else if (r.type === 'source') {
            html += renderSourceVerification(r);
        }
    }

    html += '</details>';
    panel.innerHTML = html;
    button.parentElement.appendChild(panel);
    button.removeAttribute('aria-busy');
    button.disabled = false;
}

function renderBeliefVerification(result) {
    if (!result.ok) {
        return `<div class="verify-item verify-error">
            <span class="verify-icon">&#10007;</span>
            <div><strong>${result.id}</strong> — not found in any expert</div>
        </div>`;
    }
    const d = result.data;
    const isIn = d.truth_value === 'IN';
    const cls = isIn ? 'verify-in' : 'verify-out';
    const icon = isIn ? '&#10003;' : '&#9888;';

    let details = '';
    if (result.expert) {
        details += `<div class="verify-detail">Expert: ${result.expert}</div>`;
    }
    if (d.source) {
        details += `<div class="verify-detail">Source: ${d.source}</div>`;
    }
    if (d.justifications && d.justifications.length > 0) {
        const j = d.justifications[0];
        if (j.antecedents && j.antecedents.length > 0) {
            details += `<div class="verify-detail">Depends on: ${j.antecedents.join(', ')}</div>`;
        }
    }
    if (d.dependents && d.dependents.length > 0) {
        details += `<div class="verify-detail">${d.dependents.length} dependent belief(s)</div>`;
    }

    // Find the project ID for explain drill-down
    const projectId = result.expert ? expertsMap[result.expert] : null;
    const explainBtn = projectId
        ? `<button class="outline verify-btn" onclick="explainBelief(this, '${projectId}', '${d.id}')"
            style="font-size:0.75rem; padding:0.1rem 0.5rem; margin-top:0.25rem;">Why?</button>`
        : '';

    return `<div class="verify-item ${cls}">
        <span class="verify-icon">${icon}</span>
        <div>
            <strong>${d.id}</strong> <span class="verify-status">[${d.truth_value}]</span>
            <div class="verify-text">${d.text}</div>
            ${details}
            ${explainBtn}
        </div>
    </div>`;
}

function renderEntryVerification(result) {
    if (!result.ok) {
        return `<div class="verify-item verify-error">
            <span class="verify-icon">&#10007;</span>
            <div><strong>Entry ${result.id}</strong> — not found in any expert</div>
        </div>`;
    }
    const d = result.data;
    const snippet = d.content.length > 300 ? d.content.substring(0, 300) + '...' : d.content;
    let sourceDetails = '';
    if (d.sources && d.sources.length > 0) {
        const sourceLinks = d.sources.map(s =>
            s.url ? `<a href="${s.url}" target="_blank">${s.slug}</a>` : s.slug
        ).join(', ');
        sourceDetails = `<div class="verify-detail">Sources: ${sourceLinks}</div>`;
    }
    return `<div class="verify-item verify-in">
        <span class="verify-icon">&#10003;</span>
        <div>
            <strong>Entry ${d.id}</strong>${d.title ? ` — ${d.title}` : ''}
            ${result.expert ? `<div class="verify-detail">Expert: ${result.expert}</div>` : ''}
            <div class="verify-detail">Topic: ${d.topic}</div>
            ${sourceDetails}
            <div class="verify-text">${snippet}</div>
        </div>
    </div>`;
}

function renderSourceVerification(result) {
    if (!result.ok) {
        return `<div class="verify-item verify-error">
            <span class="verify-icon">&#10007;</span>
            <div><strong>Source ${result.id}</strong> — not found in any expert</div>
        </div>`;
    }
    const d = result.data;
    let details = '';
    if (result.expert) {
        details += `<div class="verify-detail">Expert: ${result.expert}</div>`;
    }
    if (d.url) {
        details += `<div class="verify-detail">URL: <a href="${d.url}" target="_blank">${d.url}</a></div>`;
    }
    if (d.word_count) {
        details += `<div class="verify-detail">${d.word_count.toLocaleString()} words</div>`;
    }
    return `<div class="verify-item verify-in">
        <span class="verify-icon">&#10003;</span>
        <div>
            <strong>Source</strong> ${d.slug}
            ${details}
        </div>
    </div>`;
}

async function explainBelief(button, projectId, nodeId) {
    button.setAttribute('aria-busy', 'true');
    try {
        const resp = await fetch(`/api/projects/${projectId}/beliefs/${nodeId}/explain`);
        const data = await resp.json();
        const steps = data.steps || [];
        if (steps.length === 0) {
            button.replaceWith(Object.assign(document.createElement('div'),
                { className: 'verify-detail', textContent: 'Premise — no justification chain (directly asserted).' }));
            return;
        }
        const el = document.createElement('div');
        el.className = 'verify-detail';
        el.innerHTML = '<ol style="margin:0.25rem 0; padding-left:1.5rem; font-size:0.8rem;">' +
            steps.map(s => `<li><strong>${s.node}</strong> [${s.truth_value}] — ${s.reason}</li>`).join('') + '</ol>';
        button.replaceWith(el);
    } catch (e) {
        button.removeAttribute('aria-busy');
        button.textContent = 'Error';
    }
}
</script>
{% endblock %}
