{% extends "base.html" %}
{% block title %}New Project — Reasons Service{% endblock %}
{% block content %}
<hgroup>
    <h1>New Project</h1>
    <p>Create a new domain expert knowledge base</p>
</hgroup>

<form method="post" action="/projects/new">
    <label for="name">Project Name
        <input type="text" id="name" name="name" placeholder="e.g. aap-expert" required>
    </label>
    <label for="domain">Domain Description
        <input type="text" id="domain" name="domain" placeholder="e.g. Red Hat Ansible Automation Platform 2.6" required>
    </label>
    <button type="submit">Create Project</button>
</form>
{% endblock %}
