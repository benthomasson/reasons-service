{% extends "base.html" %}
{% block title %}New Domain — Reasons Service{% endblock %}
{% block content %}
<hgroup>
    <h1>New Domain</h1>
    <p>Create a new domain knowledge base</p>
</hgroup>

<form method="post" action="/domains/new">
    <label for="name">Domain Name
        <input type="text" id="name" name="name" placeholder="e.g. aap-domain" required>
    </label>
    <label for="description">Description
        <input type="text" id="description" name="description" placeholder="e.g. Red Hat Ansible Automation Platform 2.6" required>
    </label>
    <button type="submit">Create Domain</button>
</form>
{% endblock %}
