services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: reasons_service
      POSTGRES_USER: expert
      POSTGRES_PASSWORD: expert_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./reasons_service/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  service:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://expert:expert_dev@postgres:5432/reasons_service
      DATABASE_URL_SYNC: postgresql+psycopg://expert:expert_dev@postgres:5432/reasons_service
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/application_default_credentials.json
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-http://host.docker.internal:3000}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ~/.config/gcloud/application_default_credentials.json:/gcp/application_default_credentials.json:ro
    depends_on:
      - postgres

volumes:
  pgdata:
